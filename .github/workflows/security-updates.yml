name: Security Updates

on:
  # Run every Monday at 08:00 UTC
  schedule:
    - cron: '0 8 * * 1'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  update-deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install npm-check-updates
        run: npm install -g npm-check-updates

      - name: Update package.json to latest versions
        run: npx npm-check-updates -u

      - name: Regenerate package-lock.json (without installing)
        run: npm install --package-lock-only

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📦 build: update npm dependencies to latest versions"
          branch: chore/update-dependencies
          delete-branch: true
          title: "📦 build: update npm dependencies"
          body: |
            ## Automated Dependency Update

            This PR was automatically generated by the **Update Dependencies** workflow.

            ### What changed?
            - `package.json` — versions bumped to latest via `npm-check-updates`
            - `package-lock.json` — regenerated via `npm install --package-lock-only`

            ### Next steps
            1. Review the version bumps below.
            2. Trigger your CI tests to verify nothing broke.
            3. Merge if all checks pass ✅
          labels: dependencies
